<!-- MakerJackie 微信公众号模板 -->
<section style="margin:0;padding:24px 0;background-color:#ffffff;">
  <section style="margin:0 auto;padding:0 16px;max-width:677px;box-sizing:border-box;">

    <!-- 文章头部 -->
    <section style="margin:0 0 24px;padding:18px;border:3px solid #000000;background-color:#ffffff;box-sizing:border-box;">
      <p style="margin:0 0 12px;font-size:12px;line-height:1.6;letter-spacing:1px;color:#000000;font-weight:700;font-family:Menlo,Monaco,Consolas,'Courier New',monospace;">
        {{CATEGORY}} / {{DATE}}
      </p>
      <p style="margin:0;font-size:30px;line-height:1.35;color:#000000;font-weight:900;">
        {{TITLE}}
      </p>
    </section>

    <!-- 正文段落 -->
    <p style="margin:0 0 18px;font-size:17px;line-height:1.9;color:#111111;">
      {{PARAGRAPH}}
    </p>

    <!-- 章节标题 -->
    <section style="margin:0 0 32px;padding:0;box-sizing:border-box;">
      <section style="margin:0 0 18px;padding-top:14px;border-top:3px solid #000000;">
        <p style="margin:0 0 10px;font-size:12px;line-height:1.6;letter-spacing:1px;color:#000000;font-weight:700;font-family:Menlo,Monaco,Consolas,'Courier New',monospace;">
          {{SECTION_NUMBER}} / {{SECTION_LABEL}}
        </p>
        <p style="margin:0;font-size:25px;line-height:1.45;color:#000000;font-weight:900;">
          {{SECTION_TITLE}}
        </p>
      </section>
      <!-- 章节内容 -->
    </section>

    <!-- 卡片组件 -->
    <section style="margin:0 0 14px;padding:16px;border:2px solid #000000;background-color:#ffffff;box-sizing:border-box;">
      <p style="margin:0 0 8px;font-size:12px;line-height:1.6;letter-spacing:1px;color:#000000;font-weight:700;font-family:Menlo,Monaco,Consolas,'Courier New',monospace;">
        {{CARD_LABEL}}
      </p>
      <p style="margin:0;font-size:16px;line-height:1.9;color:#111111;">
        {{CARD_CONTENT}}
      </p>
    </section>

    <!-- 强调引用 -->
    <section style="margin:0 0 18px;padding:16px 18px;background-color:#000000;box-sizing:border-box;">
      <p style="margin:0;font-size:18px;line-height:1.9;color:#ffffff;font-weight:700;">
        {{QUOTE}}
      </p>
    </section>

    <!-- CTA 区块 -->
    <section style="margin:0 0 28px;padding:18px;border:2px solid #000000;background-color:#ffffff;box-sizing:border-box;">
      <p style="margin:0 0 10px;font-size:12px;line-height:1.6;letter-spacing:1px;color:#000000;font-weight:700;font-family:Menlo,Monaco,Consolas,'Courier New',monospace;">
        CTA / {{CTA_LABEL}}
      </p>
      <p style="margin:0;font-size:16px;line-height:1.9;color:#111111;">
        {{CTA_CONTENT}}
      </p>
    </section>

    <!-- 页脚 (轻量化设计) -->
    <section style="margin:48px 0 0;padding:24px 0 0;border-top:1px solid #eeeeee;box-sizing:border-box;">
      <section style="display:flex;align-items:flex-start;gap:16px;">
        <div style="flex-shrink:0;">
          <img src="https://01mvp.com/avatar.jpg" style="width:48px;height:48px;border:2px solid #000000;display:block;" alt="Avatar">
        </div>
        <div style="flex:1;">
          <p style="margin:0 0 4px;font-size:16px;line-height:1.4;color:#000000;font-weight:900;">
            {{AUTHOR_NAME}}
          </p>
          <p style="margin:0 0 12px;font-size:13px;line-height:1.5;color:#666666;">
            {{BRAND_SLOGAN}}
          </p>
          <p style="margin:0 0 6px;font-size:13px;color:#999999;font-family:Menlo,Monaco,Consolas,monospace;">
            CONTACT / {{CONTACT_EMAIL}}
          </p>
          <p style="margin:0;font-size:13px;color:#999999;font-family:Menlo,Monaco,Consolas,monospace;">
            WEBSITE / <a href="{{BRAND_URL}}" style="color:#000000;text-decoration:underline;font-weight:700;">{{BRAND_DOMAIN}}</a>
          </p>
        </div>
      </section>
    </section>

  </section>
</section>
