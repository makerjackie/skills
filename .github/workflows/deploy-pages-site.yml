name: Deploy 01MVP Skills Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-skills-site-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=skills-01mvp --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
