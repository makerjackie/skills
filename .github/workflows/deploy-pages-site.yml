name: Deploy MakerJackie Skills Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-skills-site-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install --global wrangler@4.80.0

      - name: Deploy static site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy site \
            --project-name=makerjackie-skills \
            --branch=main \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="GitHub Actions deploy ${GITHUB_SHA}"
