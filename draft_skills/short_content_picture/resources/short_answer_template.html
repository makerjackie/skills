<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短的回答 #001</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --accent: #f5f5f5;
            --border: 3px solid #000;
            --pad: 2.5rem;
            --font-main: 'Noto Sans SC', 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }

        body {
            background: #e5e5e5;
            font-family: var(--font-main);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .slide {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3/4; 
            background: var(--bg);
            border: var(--border);
            padding: var(--pad);
            padding-top: 5rem;
            position: relative;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            justify-content: space-between;
        }

        /* HEADER */
        .header-path {
            position: absolute;
            top: var(--pad);
            left: var(--pad);
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.1rem;
            color: #000;
            border-bottom: 3px solid #000; 
            padding-bottom: 8px;
            z-index: 10;
        }

        /* CONTENT */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Center vertically */
            gap: 2rem;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 3.2rem; 
            font-weight: 900; 
            line-height: 1.25; 
            letter-spacing: -0.03em; 
            color: #000;
        }

        .answer-text {
            font-size: 1.8rem; 
            font-weight: 700; /* Bold per request */
            line-height: 1.5;
            color: #000;
        }

        .explanation-text {
            font-size: 1.1rem;
            color: #888; /* Gray small text */
            font-weight: 500;
            line-height: 1.6;
        }

        /* FOOTER (Single Line) */
        .bottom-author-row {
            border-top: 1px solid #ccc;
            padding-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Align right */
            gap: 12px;
        }

        .author-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #000;
            object-fit: cover;
            background: #eee;
        }

        .author-name {
            font-weight: 900;
            font-size: 1.1rem;
            color: #000;
        }

    </style>
</head>
<body>

    <!-- SHORT ANSWER CARD -->
    <div class="slide">
        
        <!-- Header: Short Answer #001 -->
        <div class="header-path">
            <span>短的回答 #001</span>
        </div>

        <div class="content-area">
            <!-- Question: Black Big -->
            <div class="question-text">
                怎样才算<br>活在当下？
            </div>

            <!-- Answer: Medium Bold -->
            <div class="answer-text">
                不要为了“省时间”而去生活。<br>
                因为省下来的时间，<br>并没有地方可以存。
            </div>
            
            <!-- Explanation: Gray Small -->
            <div class="explanation-text">
                我们总想着忙完这一阵就好了，但其实忙完这一阵，还有下一阵。时间是流动的生命，不是银行里的存款。
            </div>
        </div>

        <!-- Bottom Footer: Single Line -->
        <div class="bottom-author-row">
            <img src="../jackie-avatar.jpg" class="author-avatar" alt="Jackie">
            <span class="author-name">创造者 Jackie</span>
        </div>

    </div>

</body>
</html>
