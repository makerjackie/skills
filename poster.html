<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  padding: 0;
  width: 1080px;
  height: 1920px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--fg);
}
.container {
  padding: 120px 100px;
  text-align: center;
  max-width: 880px;
}
h1 {
  font-size: 96px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin: 0 0 40px 0;
}
h2 {
  font-size: 48px;
  font-weight: 400;
  line-height: 1.3;
  margin: 0 0 60px 0;
}
p {
  font-size: 32px;
  line-height: 1.5;
  margin: 0 0 40px 0;
}
.qrcode {
  width: 200px;
  height: 200px;
  margin-top: 40px;
}
</style>
</head>
<body>
<div class="container">
  <h1>AI 技能工作坊</h1>
  <h2>打造你的专属 AI Agent</h2>
  <p>2024年3月20日 · 线上直播</p>
  <img src="qrcode.png" class="qrcode">
</div>
</body>
</html>
